<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.44/dist/katex.min.css"
        integrity="sha384-irXK0JiCGinqGL+slwVklbhJetrjczNwaP2lANewD8lKAs9n61SbQ3As28iSqXUE" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.44/dist/katex.min.js"
        integrity="sha384-m/s9umSlhJbqEdA/j7pQVdGCMx2fHf7GXtgCVhNGOwLuu+1qJQES5AzIE8pn3nKQ"
        crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.44/dist/contrib/auto-render.min.js"
        integrity="sha384-bjyGPfbij8/NDKJhSGZNP/khQVgtHUE5exjm4Ydllo42FwIgYsdLO2lXGmRBf5Mz" crossorigin="anonymous"
        onload="renderMathInElement(document.body);"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            font-size: 30px;
            padding: 50px;
        }

        .difficulty {
            font-size: 30px;
            color: #888888;
            font-weight: normal;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <h2 style="margin-bottom: 30px;">
        문제 4
        <span class="difficulty">난이도: 3/10</span>
    </h2>

    <p style="margin-bottom: 50px;">
        세 실수 \(x\), \(y\), \(z \ \)에 대하여 \(a^{x} = 3\),
        \(b^{y} = \dfrac{1}{9}\), \(c^{z} = 27 \ \)이고
        \(\dfrac{1}{x} - \dfrac{2}{y} - \dfrac{3}{z} = 2 \ \)일 때,
        \(ab = kc \ \)이다.
        상수 \(k \ \)의 값을 구하시오.
    </p>

    <input id="input" type="number" min="0" max="999" placeholder="답안" required>
    <button onclick="checkAnswer();">제출하기</button>
    <p id="output"></p>

    <script>
        function checkAnswer() {
            const correctAnswer = 9;

            const input = document.getElementById("input").value;
            const output = document.getElementById("output");

            if (parseInt(input) === correctAnswer) {
                output.textContent = "정답입니다!";
            } else {
                output.textContent = "오답입니다!";
            }
        }
    </script>
</body>

</html>
